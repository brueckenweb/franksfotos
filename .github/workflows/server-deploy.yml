name: Deploy Next.js franksfotos to Server

on:
  push:
    branches:
      - main

env:
  DEPLOY_PATH: /home/users/franksellke/www/frank-sellke

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Prüfe SSH_KEY
        run: |
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
              echo "SSH_KEY ist NICHT gesetzt!"
              exit 1
          else
              echo "SERVER_SSH_KEY ist gesetzt."
          fi

      - name: Erstelle SSH-Key-Datei
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          echo "✓ SSH-Key erstellt"

      - name: Teste SSH-Verbindung
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            echo "SSH-Verbindung erfolgreich!"
            whoami
            pwd
          '

      - name: Erstelle .env.production aus Secret (für Build)
        env:
          FRANKSFOTOS_ENV: ${{ secrets.FRANKSFOTOS_ENV }}
        run: |
          printf '%s\n' "$FRANKSFOTOS_ENV" > .env.production
          echo "✓ .env.production erstellt ($(wc -l < .env.production) Zeilen)"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Prüfe Build-Output
        run: |
          echo "=== Build-Überprüfung ==="
          ls -la .next/server/app/ | head -20
          echo "Routen-Dateien vorhanden:"
          [ -f ".next/server/app/page.js" ] && echo "✓ .next/server/app/page.js (Root-Route)" || echo "✗ ROOT PAGE FEHLT!"
          [ -d ".next/server/app/admin" ] && echo "✓ admin-Route" || echo "✗ admin fehlt"

      - name: Synchronisiere neue Dateien vom Server ins Repository
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd /home/users/franksellke/www/frank-sellke
            git config user.email "github-actions@github.com"
            git config user.name "GitHub Actions"
            git pull origin main
            git add public/
            if ! git diff --cached --quiet; then
              git commit -m "Sync neue/aktualisierte Dateien aus public von Server"
              git push origin main
              echo "✓ public-Dateien ins Repository gepusht."
            else
              echo "Keine neuen Dateien in public."
            fi
          '

      - name: Bereite Zielverzeichnis vor (alte Dateien löschen)
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd /home/users/franksellke/www/frank-sellke
            echo "Vor dem Löschen:"
            ls -la
            rm -rf .next package.json package-lock.json public ecosystem.config.cjs .env.production .htaccess
            mkdir -p log/pm2
            echo "Nach dem Löschen:"
            ls -la
          '

      - name: Erstelle tar-Archiv
        run: |
          mkdir -p public
          tar -czf deployment.tar.gz \
            .next \
            package.json \
            package-lock.json \
            public \
            ecosystem.config.cjs \
            .env.production \
            .htaccess
          echo "✓ Archiv erstellt: $(du -h deployment.tar.gz | cut -f1)"

      - name: Übertrage Archiv via SCP
        run: |
          echo "=== Übertrage deployment.tar.gz via SCP ==="
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            deployment.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/users/franksellke/www/frank-sellke/deployment.tar.gz
          echo "✓ Übertragung abgeschlossen"

      - name: Entpacke Archiv auf Server
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            set -e
            cd /home/users/franksellke/www/frank-sellke
            echo "=== Entpacke deployment.tar.gz ==="
            tar -xzf deployment.tar.gz
            if [ $? -ne 0 ]; then
              echo "❌ FEHLER beim Entpacken!"
              exit 1
            fi
            rm deployment.tar.gz
            echo "✓ Archiv entpackt"

            echo "=== Verzeichnisinhalt nach Entpacken ==="
            ls -la

            echo "=== Wichtige Dateien prüfen ==="
            [ -f "package.json" ]           && echo "✓ package.json" || { echo "✗ package.json FEHLT"; exit 1; }
            [ -d ".next" ]                  && echo "✓ .next/" || { echo "✗ .next FEHLT"; exit 1; }
            [ -f ".next/server/app/page.js" ] && echo "✓ Root-Route page.js" || echo "⚠ Root-Route page.js nicht gefunden!"
            [ -d "public" ]                 && echo "✓ public/" || echo "⚠ public fehlt"
            [ -f "ecosystem.config.cjs" ]   && echo "✓ ecosystem.config.cjs" || { echo "✗ ecosystem.config.cjs FEHLT"; exit 1; }
          '

      - name: Install Dependencies auf Server
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            set -e
            cd /home/users/franksellke/www/frank-sellke
            echo "=== Installiere Dependencies (npm ci) ==="
            npm ci --legacy-peer-deps --omit=dev
            echo "✓ Dependencies installiert"
          '

      - name: Stoppe PM2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            pm2 stop franksfotos-prod 2>/dev/null || echo "War nicht aktiv"
            pm2 delete franksfotos-prod 2>/dev/null || echo "War nicht registriert"
            pm2 list
            echo "✓ PM2 bereinigt"
          '

      - name: Starte PM2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            set -e
            cd /home/users/franksellke/www/frank-sellke
            export NODE_ENV=production
            pm2 start ecosystem.config.cjs
            sleep 15

            echo "=== PM2 Status ==="
            pm2 list

            if pm2 list | grep -q "franksfotos-prod.*online"; then
              echo "✅ franksfotos-prod läuft!"
            else
              echo "❌ franksfotos-prod läuft NICHT!"
              pm2 logs franksfotos-prod --lines 30 --nostream || true
              exit 1
            fi

            echo "=== PM2 Logs (letzte 15 Zeilen) ==="
            pm2 logs franksfotos-prod --lines 15 --nostream || true

            echo "=== Port 3001 prüfen ==="
            if ss -tlnp 2>/dev/null | grep -q ":3001 "; then
              echo "✅ Port 3001 aktiv"
            else
              echo "⚠ Port 3001 noch nicht sichtbar"
            fi

            pm2 save
          '

      - name: Teste Root-Route direkt auf Server
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            sleep 5
            echo ""
            echo "=== TEST 1: Direkter Aufruf localhost:3001/ ==="
            HTTP_STATUS=$(curl -s -o /tmp/curl_out1.txt -w "%{http_code}" http://localhost:3001/ 2>/dev/null || echo "FEHLER")
            echo "HTTP Status (direkt): $HTTP_STATUS"

            echo ""
            echo "=== TEST 2: Mit Apache-Headern (Host: frank-sellke.de) ==="
            HTTP_STATUS2=$(curl -s -o /tmp/curl_out2.txt -w "%{http_code}" \
              -H "Host: frank-sellke.de" \
              -H "X-Forwarded-Proto: https" \
              -H "X-Forwarded-Port: 443" \
              http://localhost:3001/ 2>/dev/null || echo "FEHLER")
            echo "HTTP Status (mit Apache-Headers): $HTTP_STATUS2"

            echo ""
            echo "=== TEST 3: Mit Apache-Headern (Host: www.frank-sellke.de) ==="
            HTTP_STATUS3=$(curl -s -o /tmp/curl_out3.txt -w "%{http_code}" \
              -H "Host: www.frank-sellke.de" \
              -H "X-Forwarded-Proto: https" \
              -H "X-Forwarded-Port: 443" \
              http://localhost:3001/ 2>/dev/null || echo "FEHLER")
            echo "HTTP Status (mit www-Header): $HTTP_STATUS3"

            echo ""
            echo "=== Vergleich der Responses ==="
            if [ "$HTTP_STATUS" = "200" ] && [ "$HTTP_STATUS2" != "200" ]; then
              echo "⚠ PROBLEM GEFUNDEN: Direkt=200 aber mit Apache-Headers=$HTTP_STATUS2"
              echo "→ Next.js verhält sich anders mit Apache-Proxy-Headers!"
              echo "Response-Anfang mit Apache-Headers:"
              head -3 /tmp/curl_out2.txt
            elif [ "$HTTP_STATUS" = "200" ] && [ "$HTTP_STATUS2" = "200" ]; then
              echo "✅ Beide Tests geben 200 zurück – Problem liegt in Apache-Konfiguration!"
            else
              echo "❌ Direkt-Test gibt $HTTP_STATUS zurück"
            fi

            echo ""
            echo "=== Apache Access Log (letzte 20 Zeilen) ==="
            tail -20 /home/users/franksellke/logs/frank-sellke.de/access.log 2>/dev/null || echo "Log nicht zugänglich"

            echo ""
            echo "=== Apache Error Log (letzte 10 Zeilen) ==="
            tail -10 /home/users/franksellke/logs/frank-sellke.de/error.log 2>/dev/null || echo "Error-Log nicht zugänglich"

            echo ""
            echo "=== .htaccess Inhalt auf dem Server ==="
            cat /home/users/franksellke/www/frank-sellke/.htaccess 2>/dev/null || echo ".htaccess nicht gefunden!"

            echo ""
            echo "=== Apache Module prüfen ==="
            apache2ctl -M 2>/dev/null | grep -E "proxy|rewrite" || \
            apachectl -M 2>/dev/null | grep -E "proxy|rewrite" || \
            echo "Apache Module nicht prüfbar"

            echo ""
            echo "=== PM2 Logs (neueste Fehler) ==="
            pm2 logs franksfotos-prod --lines 10 --nostream --err 2>/dev/null || true
          '

      - name: Deploye PHP-Upload-Dateien zu pics.frank-sellke.de
        run: |
          echo "=== Suche Webroot von pics.frank-sellke.de ==="

          # Strategie 1: GitHub Secret PICS_DEPLOY_PATH (höchste Priorität)
          PICS_WEBROOT="${{ secrets.PICS_DEPLOY_PATH }}"

          if [ -n "$PICS_WEBROOT" ]; then
            echo "✓ Verwende PICS_DEPLOY_PATH Secret: $PICS_WEBROOT"
          else
            # Strategie 2: Apache-Konfiguration nach pics.frank-sellke.de durchsuchen
            echo "Suche pics.frank-sellke.de in Apache-Konfiguration..."
            PICS_WEBROOT=$(ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
                grep -r "pics\.frank-sellke\.de" \
                  /etc/apache2/sites-enabled/ \
                  /etc/apache2/vhosts.d/ \
                  /etc/apache2/conf.d/ \
                  /etc/httpd/conf.d/ \
                  /etc/httpd/vhosts.d/ \
                  /usr/local/etc/apache24/Includes/ \
                  2>/dev/null | \
                grep -i "DocumentRoot\|document_root\|VirtualHost\|ServerName" | \
                grep -i "DocumentRoot" | \
                head -1 | \
                sed "s/.*DocumentRoot[[:space:]]*//" | \
                tr -d "\"'"'"'" | \
                awk "{print \$1}"
              ')
            echo "Aus Apache-Config: '$PICS_WEBROOT'"

            # Strategie 3: Hosting-Panel-Konfiguration lesen (keyhelp/ispconfig)
            if [ -z "$PICS_WEBROOT" ]; then
              echo "Suche im Hosting-Panel..."
              PICS_WEBROOT=$(ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
                ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
                  # KeyHelp vhost-Konfiguration
                  grep -r "pics\.frank-sellke\.de" /etc/apache2/ /etc/nginx/ 2>/dev/null | \
                  grep -i "root\|docroot" | head -1 | \
                  sed "s/.*root[[:space:]]*//" | tr -d "\";" | awk "{print \$1}"
                ')
              echo "Aus Hosting-Config: '$PICS_WEBROOT'"
            fi

            # Strategie 4: Im User-Verzeichnis suchen
            if [ -z "$PICS_WEBROOT" ]; then
              echo "Zeige alle www-Verzeichnisse des Users für manuelle Diagnose..."
              ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
                ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
                  echo "=== Inhalt von ~/www/ ==="
                  ls -la ~/www/ 2>/dev/null || ls -la /home/users/$USER/www/ 2>/dev/null || echo "(nicht zugänglich)"
                  echo ""
                  echo "=== Suche nach pics-Verzeichnissen ==="
                  find ~ -maxdepth 5 -type d \( -name "pics" -o -name "pics.frank-sellke.de" -o -name "pictures" \) 2>/dev/null
                  echo ""
                  echo "=== Apache vhosts (pics) ==="
                  grep -r "pics" /etc/apache2/sites-enabled/ 2>/dev/null | grep -i "ServerName\|DocumentRoot" | head -20 || echo "(keine Treffer)"
                '
            fi
          fi

          if [ -z "$PICS_WEBROOT" ]; then
            echo ""
            echo "❌ Webroot von pics.frank-sellke.de konnte nicht gefunden werden!"
            echo "   → Bitte GitHub Secret 'PICS_DEPLOY_PATH' mit dem korrekten Pfad setzen."
            echo "   → Den Pfad aus den Logs oben ablesen."
            exit 0
          fi

          echo "=== Übertrage server-upload Dateien nach $PICS_WEBROOT ==="
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            server-upload/upload.php \
            server-upload/.htaccess \
            server-upload/.user.ini \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$PICS_WEBROOT/

          echo "✓ upload.php, .htaccess, .user.ini übertragen"

          echo "=== Setze Berechtigungen & lege Ordner an ==="
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            chmod 644 $PICS_WEBROOT/upload.php
            chmod 644 $PICS_WEBROOT/.htaccess
            chmod 644 $PICS_WEBROOT/.user.ini
            for DIR in fotos thumbs videos video-thumbs avatars; do
              mkdir -p $PICS_WEBROOT/\$DIR
              chmod 755 $PICS_WEBROOT/\$DIR
            done
            echo '=== Dateien im Webroot ==='
            ls -la $PICS_WEBROOT/
          "
          echo "✅ PHP-Upload-Server bereit"

      - name: Lösche alte Workflow-Runs (älter als 14 Tage)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Lösche Workflow-Runs älter als 14 Tage ==="
          CUTOFF_DATE=$(date -d '14 days ago' --iso-8601=seconds)
          echo "Stichtag: $CUTOFF_DATE"
          DELETED=0
          FAILED=0
          gh run list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json databaseId,createdAt,status \
            --jq ".[] | select(.createdAt < \"$CUTOFF_DATE\") | .databaseId" | \
          while read -r run_id; do
            if gh run delete "$run_id" --repo ${{ github.repository }} 2>/dev/null; then
              echo "✓ Gelöscht: Run #$run_id"
              DELETED=$((DELETED + 1))
            else
              echo "⚠ Fehler beim Löschen: Run #$run_id"
              FAILED=$((FAILED + 1))
            fi
          done
          echo "✓ Cleanup abgeschlossen"

      - name: Aufräumen
        if: always()
        run: rm -f /tmp/ssh_key
