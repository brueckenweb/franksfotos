name: Deploy Next.js franksfotos to Server

on:
  push:
    branches:
      - main

env:
  DEPLOY_PATH: /home/users/franksellke/www/frank-sellke

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prüfe SSH_KEY
        run: |
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
              echo "SSH_KEY ist NICHT gesetzt!"
              exit 1
          else
              echo "SERVER_SSH_KEY ist gesetzt (Inhalt wird nicht angezeigt)."
          fi

      - name: Teste SSH-Verbindung
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo 'SSH-Verbindung erfolgreich!'
            whoami
            pwd

      - name: Erstelle .env.production aus Secret (für Build)
        env:
          FRANKSFOTOS_ENV: ${{ secrets.FRANKSFOTOS_ENV }}
        run: |
          echo "=== Erstelle .env.production aus Secret ==="
          printf '%s\n' "$FRANKSFOTOS_ENV" > .env.production
          echo "Anzahl Zeilen: $(wc -l < .env.production)"
          echo "✓ .env.production erstellt"

      - name: Install dependencies
        run: npm install --legacy-peer-deps
            
      - name: Build
        run: npm run build

      - name: Prüfe Zielverzeichnis
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Prüfe Zielverzeichnis /home/users/franksellke/www/frank-sellke ==="
            echo "Aktueller Benutzer: $(whoami)"

            # Erstelle Verzeichnis falls nicht vorhanden
            mkdir -p /home/users/franksellke/www/frank-sellke
            mkdir -p /home/users/franksellke/www/frank-sellke/log/pm2

            # Teste Schreibrechte
            if touch /home/users/franksellke/www/frank-sellke/test-write 2>/dev/null; then
                rm /home/users/franksellke/www/frank-sellke/test-write
                echo "✓ Schreibrechte in /home/users/franksellke/www/frank-sellke: OK"
            else
                echo "✗ Schreibrechte FEHLER"
                exit 1
            fi

      - name: Synchronisiere neue Dateien vom Server ins Repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Synchronisiere neue Dateien aus public ins Repository ==="
            cd /home/users/franksellke/www/frank-sellke
            git config --global user.email "github-actions@github.com"
            git config --global user.name "GitHub Actions"
            git pull origin main
            git add public/
            if ! git diff --cached --quiet; then
              git commit -m "Sync neue/aktualisierte Dateien aus public von Server"
              git push origin main
              echo "✓ Änderungen aus public ins Repository gepusht."
            else
              echo "Keine neuen oder geänderten Dateien in public gefunden."
            fi

      - name: Bereite Zielverzeichnis vor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Bereite /home/users/franksellke/www/frank-sellke vor ==="
            ls -la /home/users/franksellke/www/frank-sellke/

            # Lösche alte Deployment-Dateien (behalte subdomain_pics, .git, log)
            cd /home/users/franksellke/www/frank-sellke
            rm -rf .next package.json public ecosystem.config.cjs .env.production .htaccess 2>/dev/null || true

            echo "Verzeichnis bereit:"
            ls -la /home/users/franksellke/www/frank-sellke/

      - name: Erstelle .env.production aus Secret
        env:
          FRANKSFOTOS_ENV: ${{ secrets.FRANKSFOTOS_ENV }}
        run: |
          echo "=== Erstelle .env.production aus Secret ==="
          printf '%s\n' "$FRANKSFOTOS_ENV" > .env.production
          echo "Anzahl Zeilen: $(wc -l < .env.production)"
          echo "✓ .env.production erstellt"

      - name: Erstelle tar-Archiv für SSH-Upload
        run: |
          echo "=== Erstelle tar-Archiv für SSH-Upload ==="
          
          # Stelle sicher dass public-Verzeichnis existiert
          mkdir -p public
          echo "Inhalt public-Verzeichnis:"
          ls -la public/

          echo "Füge .env.production zum Archiv hinzu..."
          tar -czf deployment.tar.gz .next package.json public ecosystem.config.cjs .env.production .htaccess
          ls -la deployment.tar.gz
          echo "Archiv-Größe: $(du -h deployment.tar.gz | cut -f1)"

      - name: Übertrage Dateien über SSH (base64)
        run: |
          echo "=== Übertrage deployment.tar.gz über SSH ==="

          # Erstelle temporäre SSH-Key-Datei
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          # Konvertiere zu base64 und übertrage
          base64 deployment.tar.gz | ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            echo "=== Empfange base64-Daten ==="
            base64 -d > /home/users/franksellke/www/frank-sellke/deployment.tar.gz

            echo "=== Entpacke Archiv ==="
            cd /home/users/franksellke/www/frank-sellke
            tar -xzf deployment.tar.gz
            rm deployment.tar.gz

            echo "=== Deployment erfolgreich ==="
            ls -la /home/users/franksellke/www/frank-sellke/

            echo "=== Prüfe wichtige Dateien ==="
            [ -f "package.json" ] && echo "✓ package.json vorhanden" || echo "✗ package.json fehlt"
            [ -d ".next" ] && echo "✓ .next Verzeichnis vorhanden" || echo "✗ .next Verzeichnis fehlt"
            [ -d "public" ] && echo "✓ public Verzeichnis vorhanden" || echo "✗ public Verzeichnis fehlt"
            [ -f "ecosystem.config.cjs" ] && echo "✓ ecosystem.config.cjs vorhanden" || echo "✗ ecosystem.config.cjs fehlt"
          '

          # Lösche temporäre SSH-Key-Datei
          rm -f /tmp/ssh_key

      - name: Install Dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          command_timeout: 120s
          script: |
            echo "=== Installiere Dependencies ==="
            cd /home/users/franksellke/www/frank-sellke

            if [ -f "package.json" ]; then
                echo "package.json gefunden, installiere Dependencies..."
                npm install --legacy-peer-deps
                echo "Dependencies installiert"
            else
                echo "WARNUNG: package.json nicht gefunden!"
                ls -la
                exit 1
            fi

      - name: Stop PM2 Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 60s
          command_timeout: 60s
          script: |
            echo "=== Stoppe PM2 Application 'franksfotos-prod' ==="

            pm2 list || echo "PM2 noch nicht initialisiert"
            pm2 stop franksfotos-prod 2>/dev/null || echo "franksfotos-prod war nicht aktiv"
            pm2 delete franksfotos-prod 2>/dev/null || echo "franksfotos-prod war nicht registriert"

            pm2 list
            echo "✅ PM2 Application gestoppt und bereinigt"

      - name: Start PM2 Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          command_timeout: 120s
          script: |
            echo "=== Starte PM2 Application 'franksfotos-prod' ==="
            cd /home/users/franksellke/www/frank-sellke

            if [ ! -f "ecosystem.config.cjs" ]; then
                echo "❌ FEHLER: ecosystem.config.cjs nicht gefunden!"
                ls -la
                exit 1
            fi

            if [ ! -d ".next" ]; then
                echo "❌ FEHLER: .next Verzeichnis nicht gefunden!"
                ls -la
                exit 1
            fi

            export NODE_ENV=production

            echo "Starte franksfotos-prod mit PM2..."
            pm2 start ecosystem.config.cjs

            sleep 10

            echo "=== PM2 Status ==="
            pm2 list

            if pm2 list | grep -q "franksfotos-prod.*online"; then
                echo "✅ franksfotos-prod läuft erfolgreich!"

                echo "=== Aktuelle Logs ==="
                pm2 logs franksfotos-prod --lines 10 --nostream || echo "Logs noch nicht verfügbar"

                echo "=== Port Status ==="
                if ss -tlnp | grep -q ":3001 "; then
                    echo "✅ Port 3001 ist aktiv"
                else
                    echo "⚠️ Port 3001 noch nicht aktiv (kann bei Startup normal sein)"
                fi

                pm2 save
                echo "✅ PM2 Konfiguration gespeichert"

            else
                echo "❌ FEHLER: franksfotos-prod konnte nicht gestartet werden!"
                pm2 logs franksfotos-prod --lines 20 --nostream || echo "Keine Logs verfügbar"
                exit 1
            fi
